apiVersion: v1
kind: Secret
metadata:
  name: monitor-mcp-secret
  labels:
    app.kubernetes.io/name: monitor-mcp-server
type: Opaque
stringData:
  # 请替换为实际值后再 apply，或使用 kubectl create secret 命令创建:
  #   kubectl create secret generic monitor-mcp-secret \
  #     --from-literal=token=<your-bearer-token> \
  #     --from-literal=org-id=<your-org-id>
  #
  # 警告: 请勿将包含真实凭据的文件提交到 Git 仓库！

  # Bearer Token 认证（优先级高于 Basic Auth）
  token: "<REPLACE_WITH_YOUR_TOKEN>"
  # Basic Auth 认证
  username: "<REPLACE_WITH_YOUR_USERNAME>"
  password: "<REPLACE_WITH_YOUR_PASSWORD>"
  # 多租户 OrgID
  org-id: "<REPLACE_WITH_YOUR_ORG_ID>"
