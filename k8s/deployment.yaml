apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitor-mcp-server
  labels:
    app.kubernetes.io/name: monitor-mcp-server
    app.kubernetes.io/component: mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: monitor-mcp-server
  template:
    metadata:
      labels:
        app.kubernetes.io/name: monitor-mcp-server
        app.kubernetes.io/component: mcp
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: monitor-mcp
          image: monitor-mcp-server:latest
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            # 显式声明后端类型；prometheus / thanos / mimir / victoriametrics
            - name: BACKEND_TYPE
              value: "thanos"
            - name: PROMETHEUS_URL
              value: "http://thanos-query.monitoring:9090"
            - name: PROMETHEUS_MCP_SERVER_TRANSPORT
              value: "streamable-http"
            - name: PROMETHEUS_MCP_BIND_HOST
              value: "0.0.0.0"
            # RULER_URL：Thanos 场景下不要设置！
            #   * Thanos Query (v0.13+) 已聚合 /api/v1/alerts 与 /api/v1/rules，
            #     直接走 Thanos Query 才能拿到全量；
            #   * 指向单一 Ruler 实例只能看到该副本评估的分片数据。
            #   仅 VictoriaMetrics 场景需要把 RULER_URL 指向 vmalert。
            # - name: RULER_URL
            #   value: "http://vmalert.monitoring:8880"
            - name: PROMETHEUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: monitor-mcp-secret
                  key: token
                  optional: true
            - name: PROMETHEUS_USERNAME
              valueFrom:
                secretKeyRef:
                  name: monitor-mcp-secret
                  key: username
                  optional: true
            - name: PROMETHEUS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: monitor-mcp-secret
                  key: password
                  optional: true
            - name: ORG_ID
              valueFrom:
                secretKeyRef:
                  name: monitor-mcp-secret
                  key: org-id
                  optional: true
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 12   # 最多等待 60s 首次就绪
            timeoutSeconds: 3
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
